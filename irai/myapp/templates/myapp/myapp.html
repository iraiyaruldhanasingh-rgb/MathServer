<html>
<head>
<title>IRAIYARUL</title>

<style>
body
{
    background-color: #0a1f44;   /* Dark Blue Background */
    text-align: center;
}

.box
{
    background: linear-gradient(135deg,#e0f7fa,#ffffff);
    padding: 80px;
    margin-left: 500px;
    margin-right: 500px;
    margin-top: 100px;
    border-radius: 15px;
    box-shadow: 0px 0px 15px black;
}

h1
{
    color: #003366;
}

input[type="submit"]
{
    background-color: #0077b6;
    color: white;
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
}

input[type="text"]
{
    padding: 5px;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="box">

<h1>TOTAL BILL CALCULATION</h1><br>

<h3>IRAIYARUL DHANASINGH</h3>

<br>

<form method="post">

{% csrf_token %}

<label>Price : </label>
<input type="text" name="Price"><br><br>

<label>GST : </label>
<input type="text" name="GST"><br><br>

<input type="submit" value="Calculate"><br><br>

<label>Bill</label>
<input type="text" value="{{ bill }}">

</form>

</div>

</body>
</html>
